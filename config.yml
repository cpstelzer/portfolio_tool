# Configuration for portfolio_model.py
#
# This file is loaded once at startup. Missing keys fall back to the
# built-in defaults shown below. A missing file is silently tolerated;
# a malformed file fails loudly.

cache:
  # Interior price-cache gaps strictly larger than this many *business
  # days* between two consecutive cached rows trigger:
  #   1. a refetch of the missing range from yfinance, and
  #   2. a warning if the gap still remains after refetch.
  # Set high enough to tolerate normal exchange holiday weeks (Christmas,
  # Easter, etc.) and low enough to catch real data dropouts.
  gap_warn_business_days: 5

data_sources:
  # When yfinance returns suspicious data for a ticker (interior gap or
  # stale-value run exceeding cache.gap_warn_business_days), retry the
  # affected range against Stooq (https://stooq.com) and splice the
  # result in if Stooq's data is healthier. Stooq is free, no API key
  # required, and often has cleaner data for European ETCs/ETFs where
  # Yahoo struggles. Disable per run with --no-stooq-fallback.
  stooq_fallback: true

clearing_account:
  # Master switch. When true, the broker's clearing-account ledger
  # (cashflow_detailed.csv) is loaded and used to drive a real cash
  # balance and a separate "cumulative contributed" series (net of
  # deposits and withdrawals). Buys then consume cash instead of being
  # modelled as fresh external capital injections. When false, the model
  # behaves as before: buys are treated as external injections, cash
  # only grows from sells, and no withdrawals exist.
  use_clearing_account: true

  # Path to the clearing-account CSV (relative to this config file or
  # absolute). If the file is missing the model warns and falls back to
  # the legacy behaviour above.
  path: cashflow_detailed.csv

  # IBAN suffix of your own bank account (the one money is transferred
  # to/from). Used to recognise own deposits and withdrawals when the
  # broker's "Buchungsinformationen" field is empty. Compared against
  # the "Empfänger" / "Zahlungspfl." columns by simple substring match.
  reference_iban_suffix: "4480"

  # Apply quarterly "Zinsabschluss" (clearing-account interest/fees) to
  # the cash balance. Amounts are typically tiny.
  include_clearing_interest: true

  # Emit a warning if the running cash balance ever goes negative.
  # This usually indicates a settlement-date quirk (a buy that booked
  # one or two days before its funding deposit) and is allowed.
  warn_on_negative_cash: true
